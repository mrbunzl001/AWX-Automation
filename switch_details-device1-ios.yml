---
- name: Gather switch details
  hosts: 10.254.108.13
  gather_facts: no
  connection: network_cli  # Use 'local' if using API modules
  vars:
    ansible_network_os: ios  # Change to 'ios', 'junos', etc. for your switch type
    ansible_user: "{{ lookup('env', 'SWITCH_USER') }}"
    ansible_password: "{{ lookup('env', 'SWITCH_PASS') }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

  tasks:
    - name: Gather basic facts from the switch
      arubaoss_facts:  # Change module to match your switch OS
      register: switch_facts

    - name: Display hostname
      debug:
        msg: "Switch hostname: {{ switch_facts.ansible_facts.net_hostname }}"

    - name: Display model and version
      debug:
        msg:
          - "Model: {{ switch_facts.ansible_facts.net_model }}"
          - "Version: {{ switch_facts.ansible_facts.net_version }}"

    - name: Display interface list
      debug:
        var: switch_facts.ansible_facts.net_interfaces
